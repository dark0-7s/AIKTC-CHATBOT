<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIKTC Student Desk</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #f5f7fb; }
    :root {
      --color-border-tertiary: #e2e8f0;
      --color-text-primary: #0f172a;
      --color-text-secondary: #475569;
    }
    .text-bubble-content p {
      margin-bottom: 0.5rem;
    }
    .text-bubble-content p:last-child {
      margin-bottom: 0;
    }
    .text-bubble-content ul {
      margin-bottom: 0.5rem;
      padding-left: 1.25rem;
    }
    .text-bubble-content ul:last-child {
      margin-bottom: 0;
    }
    .text-bubble-content li {
      margin-bottom: 0.25rem;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
